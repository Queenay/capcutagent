<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CapCut Facts Agent</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; font-family: 'Courier New', monospace; color: #e8e8e8; }
    button { cursor: pointer; font-family: 'Courier New', monospace; transition: opacity 0.2s; }
    button:hover:not(:disabled) { opacity: 0.8; }
    input { font-family: 'Courier New', monospace; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.5s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    // ⬇️ PASTE YOUR ANTHROPIC API KEY HERE
    const API_KEY = "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";

    const TOPICS = [
      "Space & The Universe", "The Human Body", "Ancient History",
      "Ocean Depths", "Animal Kingdom", "Psychology", "Technology",
      "World Records", "Science Mysteries", "Bizarre Laws"
    ];

    const STYLES = [
      { id: "cinematic", label: "🎬 Cinematic", color: "#ff6b35" },
      { id: "viral",     label: "⚡ Viral Short", color: "#00d4ff" },
      { id: "documentary", label: "🎙️ Documentary", color: "#a855f7" },
    ];

    function App() {
      const [topic, setTopic] = useState("");
      const [customTopic, setCustomTopic] = useState("");
      const [style, setStyle] = useState("viral");
      const [status, setStatus] = useState("idle");
      const [facts, setFacts] = useState(null);
      const [progress, setProgress] = useState(0);
      const [activeSlide, setActiveSlide] = useState(0);
      const [copied, setCopied] = useState(false);
      const progressRef = useRef(null);

      const selectedTopic = topic === "custom" ? customTopic : topic;
      const selectedStyle = STYLES.find(s => s.id === style);

      async function generateFacts() {
        if (!selectedTopic.trim()) return;
        if (API_KEY === "YOUR_API_KEY_HERE") {
          alert("Please open the HTML file in a text editor and replace YOUR_API_KEY_HERE with your Anthropic API key.");
          return;
        }
        setStatus("generating");
        setProgress(0);
        setFacts(null);
        setActiveSlide(0);

        progressRef.current = setInterval(() => {
          setProgress(p => Math.min(p + Math.random() * 8, 90));
        }, 300);

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": API_KEY,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{
                role: "user",
                content: `Create a Top 10 Facts video script about "${selectedTopic}" optimized for a ${style} style CapCut video.

Return ONLY valid JSON (no markdown, no backticks) in this exact format:
{
  "title": "Top 10 Facts About [Topic]",
  "hook": "Attention-grabbing opening line (max 12 words)",
  "outro": "Memorable closing call to action (max 10 words)",
  "music": "suggested music mood",
  "facts": [
    {
      "number": 1,
      "headline": "Short punchy title (max 6 words)",
      "fact": "The actual fact (2-3 sentences, fascinating and surprising)",
      "visual": "CapCut visual suggestion (what to show on screen)",
      "transition": "transition type",
      "duration": 6
    }
  ]
}`
              }]
            })
          });

          const data = await response.json();
          clearInterval(progressRef.current);
          setProgress(100);

          const text = data.content.map(b => b.text || "").join("");
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);

          setTimeout(() => { setFacts(parsed); setStatus("done"); }, 400);
        } catch (err) {
          clearInterval(progressRef.current);
          console.error(err);
          setStatus("error");
        }
      }

      function copyScript() {
        if (!facts) return;
        const script = `🎬 ${facts.title}\nStyle: ${style.toUpperCase()} | Music: ${facts.music}\n\n🎙️ HOOK: "${facts.hook}"\n\n${facts.facts.map(f => `[SLIDE ${f.number}] ⏱ ${f.duration}s | Transition: ${f.transition}\n📌 ${f.headline}\n${f.fact}\n🎨 Visual: ${f.visual}`).join("\n\n")}\n\n🎙️ OUTRO: "${facts.outro}"`;
        navigator.clipboard.writeText(script);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }

      const totalDuration = facts ? facts.facts.reduce((a, f) => a + f.duration, 0) + 8 : 0;

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0f" }}>

          {/* Header */}
          <div style={{ background: "linear-gradient(135deg,#0d0d1a,#1a0d2e,#0d1a1a)", borderBottom: "1px solid #1e1e3a", padding: "20px 32px", display: "flex", alignItems: "center", gap: 16, position: "sticky", top: 0, zIndex: 100 }}>
            <div style={{ width: 42, height: 42, background: "linear-gradient(135deg,#ff6b35,#ff0080)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, boxShadow: "0 0 20px #ff6b3550" }}>▶</div>
            <div>
              <div style={{ fontSize: 18, fontWeight: "bold", letterSpacing: "0.1em", color: "#fff" }}>CAPCUT FACTS AGENT</div>
              <div style={{ fontSize: 11, color: "#666", letterSpacing: "0.2em" }}>AI-POWERED VIDEO SCRIPT GENERATOR</div>
            </div>
            <div style={{ marginLeft: "auto" }}>
              <div style={{ padding: "4px 12px", background: "#00ff8820", border: "1px solid #00ff8840", borderRadius: 20, fontSize: 11, color: "#00ff88" }}>● LIVE</div>
            </div>
          </div>

          <div style={{ maxWidth: 900, margin: "0 auto", padding: "32px 24px" }}>

            {/* API Key Warning */}
            {API_KEY === "YOUR_API_KEY_HERE" && (
              <div style={{ background: "#1a1000", border: "1px solid #ffaa0060", borderRadius: 12, padding: "14px 20px", marginBottom: 20, color: "#ffaa00", fontSize: 13 }}>
                ⚠️ <strong>Add your API key:</strong> Open this HTML file in a text editor and replace <code>YOUR_API_KEY_HERE</code> with your key from <a href="https://console.anthropic.com" target="_blank" style={{ color: "#ffcc44" }}>console.anthropic.com</a>
              </div>
            )}

            {/* Config Panel */}
            <div style={{ background: "linear-gradient(135deg,#0f0f1e,#1a1a2e)", border: "1px solid #1e1e3a", borderRadius: 16, padding: 28, marginBottom: 24 }}>
              <div style={{ fontSize: 11, letterSpacing: "0.3em", color: "#555", marginBottom: 20 }}>▸ CONFIGURE YOUR VIDEO</div>

              {/* Topic */}
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 12, color: "#888", marginBottom: 10, letterSpacing: "0.1em" }}>SELECT TOPIC</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 8, marginBottom: 12 }}>
                  {TOPICS.map(t => (
                    <button key={t} onClick={() => setTopic(t)} style={{ padding: "8px 12px", background: topic === t ? "#00d4ff15" : "#ffffff05", border: `1px solid ${topic === t ? "#00d4ff" : "#2a2a4a"}`, borderRadius: 8, color: topic === t ? "#00d4ff" : "#888", fontSize: 12, textAlign: "left" }}>{t}</button>
                  ))}
                  <button onClick={() => setTopic("custom")} style={{ padding: "8px 12px", background: topic === "custom" ? "#ff6b3515" : "#ffffff05", border: `1px solid ${topic === "custom" ? "#ff6b35" : "#2a2a4a"}`, borderRadius: 8, color: topic === "custom" ? "#ff6b35" : "#888", fontSize: 12, textAlign: "left" }}>✏️ Custom...</button>
                </div>
                {topic === "custom" && (
                  <input placeholder="Enter your custom topic..." value={customTopic} onChange={e => setCustomTopic(e.target.value)}
                    style={{ width: "100%", padding: "10px 14px", background: "#0a0a18", border: "1px solid #ff6b35", borderRadius: 8, color: "#fff", fontSize: 14, outline: "none" }} />
                )}
              </div>

              {/* Style */}
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 12, color: "#888", marginBottom: 10, letterSpacing: "0.1em" }}>VIDEO STYLE</div>
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                  {STYLES.map(s => (
                    <button key={s.id} onClick={() => setStyle(s.id)} style={{ padding: "10px 18px", background: style === s.id ? `${s.color}15` : "#ffffff05", border: `1px solid ${style === s.id ? s.color : "#2a2a4a"}`, borderRadius: 10, color: style === s.id ? s.color : "#666", fontSize: 13 }}>{s.label}</button>
                  ))}
                </div>
              </div>

              {/* Generate Button */}
              <button onClick={generateFacts} disabled={!selectedTopic.trim() || status === "generating"}
                style={{ width: "100%", padding: 16, background: (!selectedTopic.trim() || status === "generating") ? "#1a1a2e" : `linear-gradient(135deg, ${selectedStyle?.color || "#ff6b35"}, #ff0080)`, border: "none", borderRadius: 12, color: (!selectedTopic.trim() || status === "generating") ? "#444" : "#fff", fontSize: 14, fontWeight: "bold", letterSpacing: "0.2em", boxShadow: selectedTopic.trim() && status !== "generating" ? `0 0 30px ${selectedStyle?.color || "#ff6b35"}40` : "none" }}>
                {status === "generating" ? "⚙ GENERATING SCRIPT..." : "▶ GENERATE VIDEO SCRIPT"}
              </button>

              {/* Progress */}
              {status === "generating" && (
                <div style={{ marginTop: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#555", marginBottom: 6 }}>
                    <span>PROCESSING WITH AI</span><span>{Math.round(progress)}%</span>
                  </div>
                  <div style={{ height: 4, background: "#1a1a2e", borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${progress}%`, background: `linear-gradient(90deg, ${selectedStyle?.color || "#ff6b35"}, #ff0080)`, borderRadius: 4, transition: "width 0.3s ease", boxShadow: `0 0 10px ${selectedStyle?.color || "#ff6b35"}80` }} />
                  </div>
                </div>
              )}
            </div>

            {/* Results */}
            {status === "done" && facts && (
              <div className="fade-in">
                {/* Meta */}
                <div style={{ background: "linear-gradient(135deg,#1a0d2e,#0d1a1a)", border: `1px solid ${selectedStyle?.color || "#ff6b35"}40`, borderRadius: 16, padding: "24px 28px", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
                  <div>
                    <div style={{ fontSize: 20, fontWeight: "bold", color: "#fff", marginBottom: 6 }}>{facts.title}</div>
                    <div style={{ fontSize: 12, color: "#666" }}>🎵 {facts.music} &nbsp;•&nbsp; ⏱ ~{totalDuration}s total &nbsp;•&nbsp; 🎬 {facts.facts.length} slides</div>
                  </div>
                  <button onClick={copyScript} style={{ padding: "10px 18px", background: copied ? "#00ff8820" : "#ffffff10", border: `1px solid ${copied ? "#00ff88" : "#3a3a5a"}`, borderRadius: 8, color: copied ? "#00ff88" : "#aaa", fontSize: 12, letterSpacing: "0.1em" }}>
                    {copied ? "✓ COPIED" : "⎘ COPY SCRIPT"}
                  </button>
                </div>

                {/* Hook */}
                <div style={{ background: "#0f0f1e", border: "1px solid #2a2a4a", borderRadius: 12, padding: "16px 20px", marginBottom: 16, borderLeft: `3px solid ${selectedStyle?.color || "#ff6b35"}` }}>
                  <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.3em", marginBottom: 6 }}>▸ OPENING HOOK</div>
                  <div style={{ fontSize: 16, color: "#fff", fontStyle: "italic" }}>"{facts.hook}"</div>
                </div>

                {/* Slides */}
                <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.3em", marginBottom: 12 }}>▸ STORYBOARD ({facts.facts.length} SLIDES)</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 12, marginBottom: 16 }}>
                  {facts.facts.map((f, i) => (
                    <div key={i} onClick={() => setActiveSlide(i)} style={{ background: activeSlide === i ? "#1a1a2e" : "#0f0f1e", border: `1px solid ${activeSlide === i ? (selectedStyle?.color || "#ff6b35") : "#1e1e3a"}`, borderRadius: 12, padding: 16, cursor: "pointer", transition: "all 0.2s", boxShadow: activeSlide === i ? `0 0 20px ${selectedStyle?.color || "#ff6b35"}20` : "none" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div style={{ width: 28, height: 28, background: `linear-gradient(135deg, ${selectedStyle?.color || "#ff6b35"}, #ff0080)`, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: "bold", color: "#fff" }}>{f.number}</div>
                        <div style={{ fontSize: 10, color: "#555" }}>⏱ {f.duration}s</div>
                      </div>
                      <div style={{ fontSize: 13, fontWeight: "bold", color: "#e8e8e8", marginBottom: 6 }}>{f.headline}</div>
                      <div style={{ fontSize: 11, color: "#666", lineHeight: 1.5, marginBottom: 10 }}>{f.fact}</div>
                      <div style={{ fontSize: 10, background: "#ffffff08", border: "1px solid #2a2a4a", borderRadius: 6, padding: "6px 8px", color: "#888" }}>🎨 {f.visual}</div>
                      <div style={{ marginTop: 8, fontSize: 10, color: selectedStyle?.color || "#ff6b35", letterSpacing: "0.1em" }}>↪ {f.transition}</div>
                    </div>
                  ))}
                </div>

                {/* Outro */}
                <div style={{ background: "#0f0f1e", border: "1px solid #2a2a4a", borderRadius: 12, padding: "16px 20px", marginBottom: 24, borderLeft: "3px solid #a855f7" }}>
                  <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.3em", marginBottom: 6 }}>▸ OUTRO & CTA</div>
                  <div style={{ fontSize: 16, color: "#fff", fontStyle: "italic" }}>"{facts.outro}"</div>
                </div>

                {/* CapCut Steps */}
                <div style={{ background: "linear-gradient(135deg,#0f0f1e,#1a0d2e)", border: "1px solid #2a2a4a", borderRadius: 16, padding: 24 }}>
                  <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.3em", marginBottom: 16 }}>▸ CAPCUT PRODUCTION WORKFLOW</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
                    {[
                      { step: "01", title: "New Project", desc: "Open CapCut → New Project → Set 9:16 for Reels/Shorts" },
                      { step: "02", title: "Background", desc: "Add black/gradient background clip for each slide duration" },
                      { step: "03", title: "Text Overlays", desc: "Paste headline + fact text per slide using Text tool" },
                      { step: "04", title: "Transitions", desc: "Apply suggested transitions between each slide" },
                      { step: "05", title: "Music", desc: `Add background track: ${facts.music}` },
                      { step: "06", title: "Auto Captions", desc: "Enable Auto Captions for accessibility" },
                      { step: "07", title: "Effects", desc: "Apply Cinematic color grade or Viral preset filter" },
                      { step: "08", title: "Export", desc: "Export 1080p 60fps → Upload to TikTok/Reels/Shorts" }
                    ].map(s => (
                      <div key={s.step} style={{ background: "#ffffff05", border: "1px solid #1e1e3a", borderRadius: 10, padding: 12 }}>
                        <div style={{ fontSize: 10, color: selectedStyle?.color || "#ff6b35", letterSpacing: "0.2em", marginBottom: 4 }}>STEP {s.step}</div>
                        <div style={{ fontSize: 12, fontWeight: "bold", color: "#ddd", marginBottom: 4 }}>{s.title}</div>
                        <div style={{ fontSize: 11, color: "#666", lineHeight: 1.4 }}>{s.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {status === "error" && (
              <div style={{ background: "#1a0a0a", border: "1px solid #ff000040", borderRadius: 12, padding: 20, textAlign: "center", color: "#ff6666" }}>
                ⚠ Error generating script. Check your API key and internet connection, then try again.
              </div>
            )}

            {status === "idle" && (
              <div style={{ textAlign: "center", padding: "60px 20px", color: "#333" }}>
                <div style={{ fontSize: 48, marginBottom: 16, opacity: 0.3 }}>▶</div>
                <div style={{ fontSize: 14, letterSpacing: "0.2em" }}>SELECT A TOPIC AND GENERATE YOUR VIDEO SCRIPT</div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
